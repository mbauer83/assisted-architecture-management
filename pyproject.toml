[project]
name = "scalable-architecture-for-humans-and-ai"
version = "0.1.0"
description = "Provides scalable and discoverable architecture management for humans and ai"
requires-python = ">=3.13"
dependencies = [
    "pyyaml>=6.0",
    "pydantic>=2.0",
    "aiosqlite>=0.20",
    "alembic>=1.13",
    "mcp>=1.27.0",
    "python-frontmatter>=1.1.0",
    "anyio>=4.0",
    "jsonschema>=4.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3",
    "pytest-bdd>=7.3",
]
gui = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.32.0",
]

[project.scripts]
sdlc-mcp-model = "src.tools.mcp_model_server:main"
sdlc-mcp-framework = "src.tools.mcp_framework_server:main"
sdlc-gui-server = "src.tools.gui_server:main"
arch-init = "src.tools.workspace_init:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src"]

[dependency-groups]
dev = [
    "pytest>=8.3",
    "pytest-bdd>=7.3",
]
