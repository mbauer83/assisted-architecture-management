reviews:
  path_filters:
    # Submodules — CodeRabbit cannot review their internals and dirty-state
    # findings are pre-existing/unrelated to the current branch's changes.
    - "!enterprise-repository/**"
    - "!engagements/**"
    - "!u2p-enterprise-repository/**"
    # Planning, progress, and task-tracking documents — narrative files that
    # change often and produce low-signal review noise.
    - "!PLAN-*.md"
    - "!TASKS-*.md"
    - "!plans/**"
    - "!**/PLAN-*.md"
    - "!**/TASKS-*.md"
