name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python · lint · types · tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y default-jre graphviz libsqlcipher-dev

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies (all groups)
        run: uv sync --all-groups

      - name: Verify generated frontend types are in sync with the ontology
        run: |
          uv run tools/generate_types.py
          git diff --exit-code -- tools/gui/src/domain/types.generated.ts \
            || { echo "::error::types.generated.ts is stale — run 'uv run tools/generate_types.py' and commit"; exit 1; }

      - name: Fetch the PlantUML runtime
        run: uv run get-plantuml

      - name: Ruff
        run: uv run ruff check src

      - name: Zuban (type check)
        run: uv run zuban check

      - name: Pytest (with coverage; fail_under ratchet from pyproject)
        run: uv run pytest --tb=short -q --cov --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  frontend:
    name: Frontend · lint · typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/gui
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: tools/gui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

  e2e:
    name: E2E · route-walk smoke
    runs-on: ubuntu-latest
    env:
      # Belt-and-suspenders: even though the CI workspace below is local-only (so the
      # backend's find_git_repos() returns nothing and the git-watcher never starts),
      # make any stray git call fail fast instead of prompting.
      GIT_TERMINAL_PROMPT: "0"
      GIT_SSH_COMMAND: "ssh -o BatchMode=yes -o ConnectTimeout=5"
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y default-jre graphviz libsqlcipher-dev

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: tools/gui/package-lock.json

      - name: Install Python dependencies
        run: uv sync --all-groups

      - name: Fetch the PlantUML runtime
        run: uv run get-plantuml

      - name: Build the GUI (served by the backend at /)
        working-directory: tools/gui
        run: |
          npm ci
          npm run build

      - name: Install Playwright browser
        working-directory: tools/gui
        run: npx playwright install --with-deps chromium

      - name: Write a local-only workspace (no git remotes → no watcher/auth in CI)
        run: |
          cat > arch-workspace.yaml <<'YAML'
          engagement:
            local: engagements/ENG-ARCH-REPO/architecture-repository
          enterprise:
            local: enterprise-repository
          YAML

      - name: Scaffold an empty local enterprise repo (gitlink is empty on CI checkout)
        run: |
          # The committed enterprise-repository is a gitlink, so a plain checkout leaves it
          # empty. arch-init's local: spec requires a model/ dir; give it an empty, valid
          # repo (model/ + the engagement's schemata) so global/enterprise views render.
          rm -rf enterprise-repository
          mkdir -p enterprise-repository/model
          cp -r engagements/ENG-ARCH-REPO/architecture-repository/.arch-repo enterprise-repository/.arch-repo

      - name: Initialise workspace (bundled self-describing model)
        run: uv run arch-init

      - name: Start the backend (serves API + built SPA on :8000)
        run: |
          uv run arch-backend --daemon
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8000/api/stats >/dev/null; then echo "backend up"; break; fi
            sleep 2
          done

      - name: Run route-walk smoke test
        working-directory: tools/gui
        env:
          E2E_BASE_URL: http://localhost:8000
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tools/gui/playwright-report/
          retention-days: 7
