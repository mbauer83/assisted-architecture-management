# Entity Ontology — ArchiMate NEXT entity type definitions
#
# Single source of truth for entity type metadata, classification hierarchy,
# and domain assignments.  Loaded by src/common/ontology_loader.py.
#
# Fields per entity type:
#   prefix              – short ID prefix (e.g. STK, DRV)
#   domain              – filesystem domain directory under model/
#   subdir              – subdirectory within the domain
#   archimate_domain    – display name of the ArchiMate domain
#   archimate_element_type – CamelCase element type for diagram blocks
#   element_classes     – ArchiMate NEXT abstract classification classes
#   create_when         - A brief description for when to model something as this type
#   never_create_when   - A brief description for when never to model something as this type

entity_types:

  # ── Motivation Domain ────────────────────────────────────────────────────
  stakeholder:
    prefix: STK
    domain: motivation
    subdir: stakeholders
    archimate_domain: Motivation
    archimate_element_type: Stakeholder
    element_classes: [motivation-element]
    create_when: "Create generalized stakeholders to model perspectives which are relevantly affected by and interested in the architecture. Stakeholders should be associated with one or more drivers and one or more goals / outcomes / assessments etc.."
    never_create_when: "Don't create stakeholders to model participation in specific behavior or for every individual participant affected by the architecture without some abstraction / generalization to avoid over-modeling."

  driver:
    prefix: DRV
    domain: motivation
    subdir: drivers
    archimate_domain: Motivation
    archimate_element_type: Driver
    element_classes: [motivation-element]
    create_when: "Create drivers to model internal or external factors (conditions, dynamics, trends etc.) that motivate the enterprise to define its goals and implement changes. Drivers should be associated with one or more stakeholders and one or more goals / outcomes / assessments etc."
    never_create_when: "Don't model something as a driver that is too operational, concrete or solution-oriented. Drivers should be more high-level, strategic and enduring in nature."

  assessment:
    prefix: ASS
    domain: motivation
    subdir: assessments
    archimate_domain: Motivation
    archimate_element_type: Assessment
    element_classes: [motivation-element]
    create_when: "Create assessments to model statements (judgments, evaluations, analyses) about specific states of affairs related to specific drivers of the enterprise. Assessments should be associated with one or more drivers and one or more goals / outcomes etc.."
    never_create_when: "Don't model something as an assessment if is insufficiently specific or if it describes a direction or motivation, or a role / actor performing an evaluation. Only include if connecting drivers to goals is insufficient."

  goal:
    prefix: GOL
    domain: motivation
    subdir: goals
    archimate_domain: Motivation
    archimate_element_type: Goal
    element_classes: [motivation-element]
    create_when: "Create goals to model high-level statements of intent or desired states of affairs that the enterprise aims to achieve. Goals can be specialized until they can be connected to specific outcomes and requirements. (Leaf-)Goals should be associated at least with one outcome."
    never_create_when: "Don't model something as a goal if it is too specific as a \"need\" or \"mustn't\" (requirement) or describes an achieved result (outcome). Goals must also be distinguished from general rules (principles)." 


  outcome:
    prefix: OUT
    domain: motivation
    subdir: outcomes
    archimate_domain: Motivation
    archimate_element_type: Outcome
    element_classes: [motivation-element]
    create_when: "Create outcomes to model observable strategic results, value-realizations, performance metrics and target-states whose achievement represents a significant contribution to the successful fulfillment of a specific goal. Outcomes should be associated with at least one goal."
    never_create_when: "Don't model something as an outcome if specifies a general intent, hope or direction (goal) or if it describes a strategy or process to achieve a goal."

  principle:
    prefix: PRI
    domain: motivation
    subdir: principles
    archimate_domain: Motivation
    archimate_element_type: Principle
    element_classes: [motivation-element]
    create_when: "Create principle to model broad, long-lasting normative rules or guidelines which inform the way the enterprise operates and evolves. Create only where it impacts specific architectural decisions."
    never_create_when: "Don't model something as a principle if it is too specific, narrowly applicable, or situative / volatile. Also avoid modeling widely understodo general policies which don't affect specific architectural decisions."

  requirement:
    prefix: REQ
    domain: motivation
    subdir: requirements
    archimate_domain: Motivation
    archimate_element_type: Requirement
    element_classes: [motivation-element]
    create_when: "Create requirements to model specific statements of need, obligation, constraint or prohibition that the architecture must satisfy in order to achieve the enterprise's goals and fulfill its motivations. Requirements should be associated with at least one outcome or principle."
    never_create_when: "Don't model something as a requirement if it is too general or high-level (goal) or not directly relevant to the architecture."

  meaning:
    prefix: MEA
    domain: motivation
    subdir: meanings
    archimate_domain: Motivation
    archimate_element_type: Meaning
    element_classes: [motivation-element]
    create_when: "Create meanings to model how different stakeholders interpret elements of the architecture (usually passive structure elements) and should be connected accordingly. Meanings stand in n-to-m relationships with passive structure elements."
    never_create_when: "Don't model something as a meaning if it is not a sufficiently specific or interest-relative description of a stakeholder's interpretation of some element of the architecture. Do not create if it does not clarify relevant perspectives or resolve important ambiguities about the architecture."


  value:
    prefix: VAL
    domain: motivation
    subdir: values
    archimate_domain: Motivation
    archimate_element_type: Value
    element_classes: [motivation-element]
    create_when: "Create values to model the worth, utility, importance, benefit, or desirability for a customer, end-user or other stakeholder of some element of the architecture (usually an active structure element) and should be connected accordingly. Values stand in n-to-m relationships with active structure elements."
    never_create_when: "Don't model something as a value if it is not sufficiently specific or interest-relative description of the value of some element of the architecture to some concern of a usually external stakeholder. Do not create if it does not clarify relevant perspectives or resolve important ambiguities about how the architecture provides value."


  # ── Strategy Domain ──────────────────────────────────────────────────────
  capability:
    prefix: CAP
    domain: strategy
    subdir: capabilities
    archimate_domain: Strategy
    archimate_element_type: Capability
    element_classes: [behavior-element, strategy-behavior-element]
    create_when: "Create capabilities to model generalabilities or capacities of the enterprise which express what it needs to do. These are usually stable unless the business-model of the enterprise changes. Resources are assigned to Capabilities, which realize Courses of Action."
    never_create_when: "Don't model something as a capability if it is too volatile or situative or if it describes a specific process or course of action."

  value-stream:
    prefix: VS
    domain: strategy
    subdir: value-streams
    archimate_domain: Strategy
    archimate_element_type: ValueStream
    element_classes: [behavior-element, strategy-behavior-element]
    create_when: "Create value streams to model the sequence of activities that create value for customers, end-users, or other stakeholders. Value streams are typically realized by processes and potentially other elements."
    never_create_when: "Don't model something as a value stream if it is not focused on value-creation. Value streams should be distinguished from processes, functions, capabilities and courses of action."

  resource:
    prefix: RES
    domain: strategy
    subdir: resources
    archimate_domain: Strategy
    archimate_element_type: Resource
    element_classes: [structure-element]
    create_when: "Create resources to model tangible or intangible strategic assets owned or controlled by the enterprise which are relevant to capabilities and may be realized by both passive and active elements."
    never_create_when: "Don't model something as a resource if it is not a strategic asset relevant to specific capabilities or if it is too volatile or situative."

  course-of-action:
    prefix: COA
    domain: strategy
    subdir: courses-of-action
    archimate_domain: Strategy
    archimate_element_type: CourseOfAction
    element_classes: [behavior-element, strategy-behavior-element]
    create_when: "Create courses of action to model specific strategic or tactical approaches or plans about how resources and capabilities are organized to influence or realize specific outcomes or requirements."
    never_create_when: "Don't model something as a course of action if it describes specific processes or functions, low-level tasks or deliverables. Courses of action should be distinguished from processes, functions and work-packages."

  # ── Common Domain (domain-neutral behavioral elements) ───────────────────
  service:
    prefix: SRV
    domain: common
    subdir: services
    archimate_domain: Common
    archimate_element_type: Service
    element_classes: [behavior-element]
    create_when: "Create services to model explicit, well-defined behavior provided by some active structure element (e.g. Application Component, Role, Business Actor, System Software) to its environment. Services serve other behavior or active structure elements, may have assigned Interfaces and be realized by Processes or Functions."
    never_create_when: "Don't model something as a service if it does not describe units of behavior grouped by external relevance and visibility to consumers from said consumers' perspective. Services should be distinguished from processes andfunctions which may realize them."

  process:
    prefix: PRC
    domain: common
    subdir: processes
    archimate_domain: Common
    archimate_element_type: Process
    element_classes: [behavior-element, internal-behavior-element]
    create_when: "Create processes to model causally / temporally ordered sequences of internal behavior to achieve a specific result. Processes may be subdivided into subordinate Processes or Functions, may be served by Services, may realize Products or Services, and may have directly or indirectly assigned Roles, Actors, Collaborations, or Application Components. Processes usually involve triggering or flow relations between subordinate elements and between each other (often mediated via Events)."
    never_create_when: "Don't model something as a Process when it describes a grouping of behavior that is mainly resource-oriented instead causally / temporally structured (Functions), when it describes how to organize Resources and Capabilities (Course of Action), or when it describes an external view on some functionality (Service, Interface). Processes may involve Junctions and one layer of subdivision, but should not be too detailed, complex, or low-level. Sequence-, Activity-, or BPMN-modeling should be used for these purposes."

  function:
    prefix: FNC
    domain: common
    subdir: functions
    archimate_domain: Common
    archimate_element_type: Function
    element_classes: [behavior-element, internal-behavior-element]
    create_when: "Create functions to model grouping of behavior that is mainly grouped by Resources, required knowledge, capacities etc. instead of causally / temporally structured. Functions may be subdivided into subordinate Functions or Processes, may be served by Services, may realize Products or Services, and may have directly or indirectly assigned Roles, Actors, Collaborations, or Application Components."
    never_create_when: "Don't model something as a Function when it describes a causally / temporally ordered sequence of behavior (Process), when it describes how to organize Resources and Capabilities (Course of Action), or when it describes an external view on some functionality (Service, Interface). Functions may involve Junctions and one layer of subdivision, but should not be too detailed, complex, or low-level. Sequence-, Activity-, or BPMN-modeling should be used for these purposes."

  event:
    prefix: EVT
    domain: common
    subdir: events
    archimate_domain: Common
    archimate_element_type: Event
    element_classes: [behavior-element]
    create_when: "Create events to model something that happens in an enterprise, such as a state change. Events may trigger or interrupt processes or functions, may access passive structure elements and may be raised / triggered by processes or functions."
    never_create_when: "Don't model something as an event if it is not relevant as a trigger or interruption to processes or functions, or if it does not represent a significant state change in the enterprise. Do not over-model events for minor state-changes that do not coordinate significant behavior."

  role:
    prefix: ROL
    domain: common
    subdir: roles
    archimate_domain: Common
    archimate_element_type: Role
    element_classes: [active-structure-element, internal-active-structure-element]
    create_when: "Create roles to model abstract types of behavior-performing entities that share certain responsibilities or capabilities relevant to the architecture. Roles usually de-couple behaviors from the Actors, Application Components or Collaborations which perform them, and may be assigned to Processes, Functions and Services."
    never_create_when: "Don't model something as a role if it is not (an abstraction of) a behavior-performing entity of if the decoupling of behavior from specific actors or components does not provide any insight or value. Do not create roles for every individual participant in processes or functions without some generalization or abstraction to avoid over-modeling."

  path:
    prefix: PTH
    domain: common
    subdir: paths
    archimate_domain: Common
    archimate_element_type: Path
    element_classes: [active-structure-element]
    create_when: "Create paths to model logical link through which internal active structure elements like Roles, Application Components, Nodes, System Software etc. may exchange energy, material, or data. Paths may be realized by Distribution Networks or Communication Networks together with the active structure elements connected by them."
    never_create_when: "Don't model something as a path if it is better modeled as a direct Collaboration or other relation, or if it is specific Communication or Distribution Network."
    


  # ── Business Domain ──────────────────────────────────────────────────────
  business-actor:
    prefix: ACT
    domain: business
    subdir: actors
    archimate_domain: Business
    archimate_element_type: BusinessActor
    element_classes: [active-structure-element, internal-active-structure-element]
    create_when: "Create business actors to model organizational entities (e.g. departments, teams, external organizations) that perform behavior relevant to the architecture. Business actors may be assigned to processes, functions and services and may be assigned to roles."
    never_create_when: "Don't model something as a business actor if it is not a concrete personal or organizational entity that performs behavior relevant to the architecture. Do not create business actors for every individual participant in processes or functions without some generalization or abstraction to avoid over-modeling."

  business-interface:
    prefix: BIF
    domain: business
    subdir: interfaces
    archimate_domain: Business
    archimate_element_type: BusinessInterface
    element_classes: [active-structure-element, external-active-structure-element]
    create_when: "Create business interfaces to model ways (or channels) through which one or more services are made accessible to a role or actor."
    never_create_when: "Don't model something as a business interface if it represents specific behavior instead of ways to access that behavior, or if the distinction between service and interface does not provide any insight or value."

  business-object:
    prefix: BOB
    domain: business
    subdir: objects
    archimate_domain: Business
    archimate_element_type: BusinessObject
    element_classes: [passive-structure-element]
    create_when: "Create business objects to model types of tangible or intangible entities or concepts that are used or produced by business processes, functions, events, or services."
    never_create_when: "Don't model something as a business object if it is not relevant to the business processes, functions, events or services."

  product:
    prefix: PRD
    domain: business
    subdir: products
    archimate_domain: Business
    archimate_element_type: Product
    element_classes: [composite-element]
    create_when: "Create products to model coherent collections of tangible or intangible objects (business or data objects), services, artifacts offered as a whole to internal or external customers. Products may aggregate objects, services, artifacts, and materials and have associated values."
    never_create_when: "Don't model something as a product if it is not a coherent offering or if no concrete elements are aggregated as parts of it."

  # ── Application Domain ───────────────────────────────────────────────────
  application-component:
    prefix: APP
    domain: application
    subdir: components
    archimate_domain: Application
    archimate_element_type: ApplicationComponent
    element_classes: [active-structure-element, internal-active-structure-element]
    create_when: "Create application components to model modular, deployable units of software at any level that perform behavior relevant to the architecture. Application components may be sources of truth for data objects and may be assigned to internal behavior elements (optionally via roles) or application events."
    never_create_when: "Don't model something as an application component if it is a specific behavior of a component or not specific enough to correspond to actual deployable software. "

  application-interface:
    prefix: AIF
    domain: application
    subdir: interfaces
    archimate_domain: Application
    archimate_element_type: ApplicationInterface
    element_classes: [active-structure-element, external-active-structure-element]
    create_when: "Create application interfaces to model points of access (and associated contracts, parameters, post-conditions, data-formats) where an Application Component exposes services."
    never_create_when: "Don't model something as an application interface if it would be better modeled as a service, process or function. Do not create if there is no meaningful distinction or impact of describing a specific way of accessing some behavior." 

  data-object:
    prefix: DOB
    domain: application
    subdir: data-objects
    archimate_domain: Application
    archimate_element_type: DataObject
    element_classes: [passive-structure-element]
    create_when: "Create data objects to model types of data relevant to the architecture which are used or produced by application components, processes, functions, events or services. Data Objects are usually associated with Application Components managing them as sources of truth."
    never_create_when: "Don't model something as a data object if it is not relevant to the behavior elements or if it is too granular to be relevant at the architectural level."

  # ── Technology Domain ────────────────────────────────────────────────────
  technology-node:
    prefix: NOD
    domain: technology
    subdir: nodes
    archimate_domain: Technology
    archimate_element_type: Node
    element_classes: [active-structure-element, internal-active-structure-element, technology-internal-active-structure-element]
    create_when: "Create technology nodes to model generic IT or physical structure which hosts or interacts with other such structures."
    never_create_when: "Don't model something as a technology node if it does not provide a coherent collection of hardware and software components which provide services used to support applications."

  device:
    prefix: DEV
    domain: technology
    subdir: devices
    archimate_domain: Technology
    archimate_element_type: Device
    element_classes: [active-structure-element, internal-active-structure-element, technology-internal-active-structure-element]
    create_when: "Create devices to model specific (potentially virtualized) IT hardware used for storage of data, processing and similar."
    never_create_when: "Don't model something as a device if it is better modeled as a technology node because it is general and represents a generic execution environment."

  system-software:
    prefix: SSW
    domain: technology
    subdir: system-software
    archimate_domain: Technology
    archimate_element_type: SystemSoftware
    element_classes: [active-structure-element, internal-active-structure-element, technology-internal-active-structure-element]
    create_when: "Create system software to model software that provides or contributes to an environment for execution, storage and use of other software or data deployed with it."
    never_create_when: "Don't model something as system software if it is better represented as an application component because it directly provides business-relevant behavior or a technology node because it represents a general execution environment."

  technology-interface:
    prefix: TIF
    domain: technology
    subdir: interfaces
    archimate_domain: Technology
    archimate_element_type: TechnologyInterface
    element_classes: [active-structure-element, external-active-structure-element]
    create_when: "Create technology interfaces to model points of access where nodes, devices, facilities, equipment or system software makes services available."
    never_create_when: "Don't model something as a technology interface if it provides no meaningful distinction of if the way of accessing some behavior does not have any impact or relevance to the architecture."

  communication-network:
    prefix: NET
    domain: technology
    subdir: networks
    archimate_domain: Technology
    archimate_element_type: CommunicationNetwork
    element_classes: [active-structure-element]
    create_when: "Create communication networks to model sets of IT structures for routing, transmission, and reception of data. Communication networks usually connect Devices and / or System Software and realize Paths."
    never_create_when: "Don't model something as a communication network if it is a logical, abstract channel for communication or distribution (Path). Don't create if the existence or structure of the network is not directly relevant to architectural decisions."

  artifact:
    prefix: ART
    domain: technology
    subdir: artifacts
    archimate_domain: Technology
    archimate_element_type: Artifact
    element_classes: [passive-structure-element]
    create_when: "Create artifacts to model \"tangible\" assets like databases, source files, container images, scripts, databases, tables, messages, documents, specifications and model files. Artifacts may realize Application Components, Data Objects, or System Software. They may be assigned to devices or system software to indicate their deployment there."
    never_create_when: "Don't model something as an artifact if it is too abstract to be tangible in the above sense. Don't create an artifact unless it has relevance to the questions addressed by the architecture or is relevant to architectural decisions above the elements it realizes."

  equipment:
    prefix: EQP
    domain: technology
    subdir: equipment
    archimate_domain: Technology
    archimate_element_type: Equipment
    element_classes: [active-structure-element, internal-active-structure-element, technology-internal-active-structure-element]
    create_when: "Create equipment to model physical, non-IT assets that are used by the enterprise and relevant to the architecture. This includes e.g. machinery, vehicles, furniture, tools, instruments, or similar."
    never_create_when: "Don't model something as equipment if it is information technology or if it is not relevant to the questions or decisions addressed by the architecture."

  facility:
    prefix: FAC
    domain: technology
    subdir: facilities
    archimate_domain: Technology
    archimate_element_type: Facility
    element_classes: [active-structure-element, internal-active-structure-element, technology-internal-active-structure-element]
    create_when: "Create facilities to model physical locations, buildings, rooms, or similar that are used by the enterprise and relevant to the architecture."
    never_create_when: "Don't model something as a facility if it is better modeled as a Resource or Process in some facility. Don't create a facility if it is not relevant to the questions or decisions addressed by the architecture."

  distribution-network:
    prefix: DIS
    domain: technology
    subdir: distribution-networks
    archimate_domain: Technology
    archimate_element_type: DistributionNetwork
    element_classes: [active-structure-element]
    create_when: "Create distribution networks to model physical networks used to transport energy or materials. Distribution networks are the physical realization of Paths between Facilities."
    never_create_when: "Don't model something as a distribution network if it is a logical, abstract channel for distribution (Path). Don't create if the existence or structure of the network is not directly relevant to architectural decisions."

  material:
    prefix: MAT
    domain: technology
    subdir: materials
    archimate_domain: Technology
    archimate_element_type: Material
    element_classes: [passive-structure-element]
    create_when: "Create materials to model physical substances or resources (including energy sources) used by the enterprise and relevant to the architecture."
    never_create_when: "Don't model something as a material if it carries out processes (Equipment), or if it is not relevant to the questions or decisions addressed by the architecture."

  # ── Implementation & Migration Domain ────────────────────────────────────
  work-package:
    prefix: WP
    domain: implementation
    subdir: work-packages
    archimate_domain: Implementation
    archimate_element_type: WorkPackage
    element_classes: [behavior-element]
    create_when: "Create work packages to model sets of actions designed and identified to achieve specific objectives (Goals, Outcomes, or Deliverables) within specified resource- and time-constraints. Work packages can be used to model project-actions at any granularity."
    never_create_when: "Don't model something as a work package if it is a recurring process of the daily work instead of a one-off process to achieve a specific objective. Don't create as a replacement for actual sprint planning or task management artifacts. Work packages provide a higher-level, architectural view of progress in the enterprise's efforts."

  deliverable:
    prefix: DEL
    domain: implementation
    subdir: deliverables
    archimate_domain: Implementation
    archimate_element_type: Deliverable
    element_classes: [passive-structure-element]
    create_when: "Create deliverables to model tangible or intangible outputs produced as a result of work packages. These may and often will be parts of the architecture itself."
    never_create_when: "Don't model something as a deliverable if it is not an output of implementation activities relevant to the questions and decisions addressed by the architecture."


  plateau:
    prefix: PLT
    domain: implementation
    subdir: plateaus
    archimate_domain: Implementation
    archimate_element_type: Plateau
    element_classes: [composite-element]
    create_when: "Create plateaus to model significant states of the architecture at specific points in time, usually representing the result of a significant phase of transformation or implementation. Plateaus are often used to model current, transition and future states of the architecture."
    never_create_when: "Don't model something as a plateau if it is not a significant stage in the evolution of the architecture or if it is not sufficiently comprehensive and temporally localized to represent a meaningful state of the architecture at a specific point in time."

  # ── Cross-repo Reference ─────────────────────────────────────────────────
  # NOT an ArchiMate element.  Created automatically as a per-engagement proxy
  # for a global (enterprise) entity.  May not be created or edited directly;
  # only produced by the connection-to-global-entity mechanism.
  global-entity-reference:
    prefix: GRF
    domain: common
    subdir: global-references
    archimate_domain: ""        # not an ArchiMate domain — skipped by macro/diagram generators
    archimate_element_type: ""  # not an ArchiMate element type
    element_classes: []
    create_when: ""
    never_create_when: ""
