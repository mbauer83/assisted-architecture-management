# ─────────────────────────────────────────────────────────────────────────────
# Backend settings for a server deployment. Mounted read-write at
# /app/config/settings.yaml so the assurance CLI can persist the active backend.
# Storage backend selection is driven by .env (the entrypoint asserts it here);
# everything else below is declarative.
# ─────────────────────────────────────────────────────────────────────────────

backend:
  port: 8000
  log_path: .arch/backend.log
  min_log_level: INFO

diagrams:
  archimate_type_markers: icons
  sprite_scale: 1.5
  render_dpi: 150
  plantuml_limit_size: 16384

repo_init:
  default_branch: main
  commit_author_name: Architecture Bot
  commit_author_email: architecture-bot@example.com

# Assurance module. Disabled by default — the no-assurance deployment. The
# entrypoint enables it (and the storage backend) when ARCH_ENABLE_ASSURANCE=true.
modules:
  assurance:
    enabled: false

storage:
  assurance:
    store_backend: sqlcipher
    signals_backend: sqlcipher-colocated
    archive_backend: standard
    # TLP exposure ceiling — highest classification served over REST/MCP.
    # TLP:WHITE | TLP:GREEN | TLP:AMBER | TLP:RED
    max_classification: TLP:AMBER

validation:
  datatype_type_references_blocking: true
