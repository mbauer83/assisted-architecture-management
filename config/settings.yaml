  plantuml_limit_size: 16384
  render_dpi: 150
  sprite_scale: 1.5
modules:
  sysml_v2_min:
    enabled: false
repo_init:
  commit_author_email: mbauer.mphil@googlemail.com
  commit_author_name: Michael Bauer
  default_branch: main
  engagement: {}
storage:
  assurance:
    max_classification: TLP:AMBER
    signals_backend: sqlcipher-colocated
    store_backend: sqlcipher
  read_model: {}
validation:
  datatype_type_references_blocking: true
