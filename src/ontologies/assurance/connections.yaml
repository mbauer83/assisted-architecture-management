# Assurance Ontology — connection types & permitted relationships
#
# All assurance connections are stored assurance-side (one-way persistence rule).
# Cross-module refs (assurance→architecture) are handled via the arch_refs
# reference-type catalog (`reference_types` below), never as connections in this
# registry. External-vocabulary citations (obligation → scheme:code) are node
# attributes validated against the reference vocabulary, not edges.
#
# Relationship vocabulary follows the STPA Handbook: `leads-to` is strictly
# causal between chain elements (UCA → hazard → loss; the handbook reserves
# "violate" for constraints); `explains` is the scenario's epistemic relation to
# whatever it describes the causal pathway for — a type-a scenario explains a
# UCA, a type-b scenario (improper execution/integration of a correct control
# action) explains a hazard directly, bypassing any UCA; system-level
# constraints derive from hazards and controller constraints from unsafe control
# actions; controllers are RESPONSIBLE FOR enforcing constraints
# (responsibilities refine system-level constraints); a risk owner is
# ACCOUNTABLE FOR a risk (ISO 31000 risk ownership).

matrix_abbreviations:
  LT: leads-to
  EX: explains
  DV: derives
  RF: refines
  RS: responsible-for
  AF: accountable-for
  EV: evidenced-by
  AS: assesses
  TB: treated-by
  CW: complies-with

connection_types:
  assurance:

    # ── Control-structure loops ──────────────────────────────────────────────
    issues:
      puml_arrow: "-->"
      symmetric: false
      classes: []

    acts-on:
      puml_arrow: "-->"
      symmetric: false
      classes: []

    feedback:
      puml_arrow: "<--"
      symmetric: false
      classes: []

    # ── STPA/CAST causal chain ───────────────────────────────────────────────
    concerns:
      puml_arrow: "..>"
      symmetric: false
      classes: []

    by-controller:
      puml_arrow: "-->"
      symmetric: false
      classes: []

    leads-to:
      puml_arrow: "-->"
      symmetric: false
      classes: []

    explains:
      puml_arrow: "..>"
      symmetric: false
      classes: []

    derives:
      puml_arrow: "..>"
      symmetric: false
      classes: []

    # ── Constraint linkage, responsibility & evidence ────────────────────────
    refines:
      puml_arrow: "..>"
      symmetric: false
      classes: []

    responsible-for:
      puml_arrow: "-->"
      symmetric: false
      classes: []

    evidenced-by:
      puml_arrow: "..>"
      symmetric: false
      classes: []

    # ── GRC ──────────────────────────────────────────────────────────────────
    accountable-for:
      puml_arrow: "-->"
      symmetric: false
      classes: []

    assesses:
      puml_arrow: "..>"
      symmetric: false
      classes: []

    treated-by:
      puml_arrow: "-->"
      symmetric: false
      classes: []

    complies-with:
      puml_arrow: "..>"
      symmetric: false
      classes: []

    # ── CAST ─────────────────────────────────────────────────────────────────
    investigates:
      puml_arrow: "-->"
      symmetric: false
      classes: []

# Cross-module architecture references (arch_refs ref_type catalog). These are
# NEVER node-pair matrix entries — they bind assurance nodes to architecture
# artifacts and are validated against this catalog, not permitted_relationships.
reference_types:
  binds-to: >-
    Binds an assurance node (control-structure node, evidence) to the
    architecture entity it represents or draws on.
  refines-requirement: >-
    Links an assurance-constraint to the ArchiMate requirement it refines
    (implementation reuses the requirement's realized-by edges). Deliberately
    named apart from the refines edge (constraint refining constraint).
  evidenced-by-artifact: >-
    Substantiates an assurance node directly by an architecture artifact —
    the lightweight alternative to an evidence node when no confidential
    evidence content exists. Deliberately named apart from the
    evidenced-by edge (assurance-constraint → evidence node).
  purl: >-
    Component identity reference (Package URL) for supply-chain
    reconciliation.

# Permitted relationships: the EXHAUSTIVE node-pair legality matrix for
# assurance edges — an edge create outside it is rejected with a typed error.
permitted_relationships:
  - [control-structure-node, control-action, [issues]]
  - [control-action, control-structure-node, [acts-on]]
  - [control-structure-node, control-structure-node, [feedback]]
  - [unsafe-control-action, control-action, [concerns]]
  - [unsafe-control-action, control-structure-node, [by-controller]]
  - [unsafe-control-action, hazard, [leads-to]]
  - [hazard, loss, [leads-to]]
  - [loss-scenario, unsafe-control-action, [explains]]
  - [loss-scenario, hazard, [explains]]
  - [hazard, assurance-constraint, [derives]]
  - [unsafe-control-action, assurance-constraint, [derives]]
  - [loss-scenario, assurance-constraint, [derives]]
  - [incident, assurance-constraint, [derives]]
  - [corrective-action, assurance-constraint, [derives]]
  - [assurance-constraint, assurance-constraint, [refines]]
  - [hazard, hazard, [refines]]
  - [control-structure-node, assurance-constraint, [responsible-for]]
  - [control-structure-node, risk, [accountable-for]]
  - [assurance-constraint, evidence, [evidenced-by]]
  - [risk, hazard, [assesses]]
  - [risk, assurance-constraint, [treated-by]]
  - [assurance-constraint, obligation, [complies-with]]
  - [incident, control-structure-node, [investigates]]
  - [incident, hazard, [investigates]]
