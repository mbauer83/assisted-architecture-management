# Assurance Ontology — entity type definitions
#
# STPA / CAST / GRC entity types. Stored in the ConfidentialAssuranceStore
# (SQLCipher), not in git-backed architecture model files.
#
# Fields:
#   prefix          – short ID prefix (e.g. LSS, HAZ)
#   hierarchy       – domain path segments; loader appends artifact_type
#   classes         – abstract classification classes
#   create_when     – when to create this type
#   never_create_when – when not to

element_classes:
  assurance-element:
    description: Root class for all assurance ontology elements
  loss-element:
    description: An undesirable stakeholder-level outcome (STAMP loss)
  hazard-element:
    description: A system state or condition that can lead to a loss under worst-case environment
  control-structure-element:
    description: A node in the STAMP hierarchical control structure
  constraint-element:
    description: A safety or security constraint derived from hazard analysis
  risk-element:
    description: A risk entity that evaluates a hazard/loss-scenario and its treatment
  incident-element:
    description: An actual occurred loss event under CAST investigation
  obligation-element:
    description: A compliance obligation instance (assurance-owned, confidential)

entity_types:

  # ── STPA/CAST/GRC — Core ─────────────────────────────────────────────────

  loss:
    prefix: LSS
    hierarchy: [assurance]
    classes: [loss-element, assurance-element]
    create_when: >
      Create a loss to represent an unacceptable outcome that stakeholders must avoid.
      A loss is the top-level anchor of a STPA/CAST analysis — everything traces back to it.
      Examples: loss of life, property damage, regulatory non-compliance, breach of privacy.
    never_create_when: >
      Never model a hazard, constraint, or specific scenario as a loss. A loss is a final,
      stakeholder-relevant outcome, not an intermediate system state.

  hazard:
    prefix: HAZ
    hierarchy: [assurance]
    classes: [hazard-element, assurance-element]
    create_when: >
      Create a hazard to represent a system-level state or set of conditions that, combined
      with worst-case environmental conditions, can lead to a loss (STPA-Sec: also a vulnerable
      system state exploitable by a threat actor). Use concern_class to distinguish safety vs
      security hazards. Hazards lead to losses and are caused by unsafe control actions.
    never_create_when: >
      Never model a specific unsafe control action or a loss scenario as a hazard. A hazard
      describes the system state, not the causal chain that produced it or the outcome it causes.

  control-structure-node:
    prefix: CSN
    hierarchy: [assurance]
    classes: [control-structure-element, assurance-element]
    create_when: >
      Create a control-structure-node to model a controller or controlled process in the STAMP
      control structure. Use node_role to classify (controller / controlled-process / actuator /
      sensor). Set binding_status to indicate whether this node is bound to an architecture entity.
      An unbound-pending node signals a modeling gap in the architecture.
    never_create_when: >
      Never create a CSN to represent an abstract concept, a loss, or a hazard. CSNs are structural
      nodes in the control hierarchy — they issue or receive control actions.

  control-action:
    prefix: CAC
    hierarchy: [assurance]
    classes: [control-structure-element, assurance-element]
    create_when: >
      Create a control-action to represent a specific command or signal that a controller issues
      to a controlled process. Every UCA must reference exactly one control-action. This gives each
      UCA a stable referent and enables the UCA matrix analysis.
    never_create_when: >
      Never model a high-level process or behavior as a control-action. A control-action is the
      specific unit of control — one actionable signal on one control loop.

  unsafe-control-action:
    prefix: UCA
    hierarchy: [assurance]
    classes: [hazard-element, assurance-element]
    create_when: >
      Create an unsafe-control-action (UCA) to represent one of the four STPA guideword scenarios:
      (1) not-provided, (2) provided (when it should not be), (3) wrong-timing, (4) stopped-too-soon.
      Each UCA must reference exactly one control-action (concerns edge) and a controller (by-controller).
      Set uca_type to one of: not-provided | provided | wrong-timing | stopped-too-soon.
      Set mode=hypothesized for STPA; mode=observed for CAST.
    never_create_when: >
      Never model a hazard, loss, or constraint as a UCA. A UCA is a specific failure of a
      specific control action in a specific context.

  assurance-constraint:
    prefix: ACN
    hierarchy: [assurance]
    classes: [constraint-element, assurance-element]
    create_when: >
      Create an assurance-constraint to represent a safety or security constraint derived from
      hazard/UCA/loss-scenario analysis. This is SEPARATE from ArchiMate requirements — it carries
      the concern_class, disposition, and integrity level of the constraint. Link it to an ArchiMate
      requirement via the refines edge (implementation reuses the requirement's realized-by edges).
      Mandatory: concern_class and accountable-to connection for safety/security constraints.
    never_create_when: >
      Never reuse an ArchiMate requirement as an assurance-constraint. The constraint holds the
      safety/security framing; the requirement holds the functional statement. They are linked, not merged.

  loss-scenario:
    prefix: LSC
    hierarchy: [assurance]
    classes: [hazard-element, assurance-element]
    create_when: >
      Create a loss-scenario to represent a causal pathway from a UCA to a hazard.
      Each loss-scenario explains one or more UCAs and derives one or more assurance-constraints.
      In CAST, loss-scenarios with mode=observed represent actual causal sequences.
    never_create_when: >
      Never model a UCA as a loss-scenario. A loss-scenario is the explanation of HOW a UCA
      leads to a hazard — it is more specific than the UCA and more causal than the hazard.

  # ── Phase 3 types (stub) ──────────────────────────────────────────────────

  risk:
    prefix: RSK
    hierarchy: [assurance]
    classes: [risk-element, assurance-element]
    create_when: >
      Create a risk entity to evaluate a hazard or loss-scenario from a GRC perspective.
      A risk is optional — constraints are valid without a risk entity. Set treatment to one of:
      mitigate | transfer | avoid | accept (accept only for non-safety concern_class).
      Link via assesses→hazard and treated-by→assurance-constraint.
    never_create_when: >
      Never use a risk entity to replace or "close" a safety/security constraint. A risk entity
      is an evaluation overlay — it can never be a precondition for a constraint's existence.

  incident:
    prefix: INC
    hierarchy: [assurance]
    classes: [incident-element, assurance-element]
    create_when: >
      Create an incident for CAST analysis — an actual occurred loss event under investigation.
      The incident anchors the CAST control-structure-as-existed reconstruction. Requires a sealed
      analysis_baseline (seal a baseline before creating observed UCAs/scenarios).
    never_create_when: >
      Never create an incident for a hypothetical hazard. Incidents are actual, occurred events.

  corrective-action:
    prefix: CRA
    hierarchy: [assurance]
    classes: [assurance-element]
    create_when: >
      Create a corrective-action to represent a recommendation from a CAST investigation or
      GRC audit. Corrective actions derive assurance-constraints that enter the GRC lifecycle.
    never_create_when: >
      Never create a corrective-action for a proactive (STPA) finding — use assurance-constraint directly.

  obligation:
    prefix: OBL
    hierarchy: [assurance]
    classes: [obligation-element, assurance-element]
    create_when: >
      Create an obligation to represent a compliance instance — "does our system comply with
      requirement X of standard/regulation Y?" The public framework catalog entry is referenced
      via cites edge (scheme:code, e.g. ISO26262:6-8). Status and evidence are assurance-owned.
    never_create_when: >
      Never model an obligation in the ArchiMate motivation layer — obligation status and evidence
      are confidential and must live in the assurance store.
