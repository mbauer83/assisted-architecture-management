- slug: goal-realization
  version: 2
  name: Goal Realization
  description: 'Goal Realization (Table C-16, realization). Assessed targets are goals: a goal is REALIZED
    iff it has an incoming archimate-realization (direct, or derived up to 4 modeled hops); realized targets
    band green and unrealized ones red, while the elements realizing them are included as unbanded context.
    Shows existing realization links only — it does not isolate gaps; use the coverage-gap views for gap
    analysis. Starting point for modeling, not a normative or exhaustive list.'
  purpose:
  - designing
  - deciding
  content:
  - coherence
  stakeholders:
  - Stakeholders
  - Business Managers
  - Enterprise Architects
  - ICT Architects
  - Business Analysts
  - Requirements Managers
  concerns:
  - architecture mission, strategy and tactics
  - motivation
  query:
    query_schema: 1
    entity_criteria:
      kind: group
      conjunction: and
      children:
      - kind: condition
        attribute: type
        comparator: eq
        value: goal
    include_connected:
    - direction: incoming
      connection_criteria: &id001
        kind: group
        conjunction: and
        children:
        - kind: condition
          attribute: type
          comparator: eq
          value: archimate-realization
    - direction: incoming
      traversal: derived
      max_hops: 4
      connection_criteria: *id001
    connections:
      traversal: both
  presentation:
    representation: exploration
    target_types:
    - goal
    styling_rules:
    - capability: node_color
      applies_to:
      - goal
      mode: match
      match_criteria:
        kind: group
        conjunction: and
        children:
        - kind: incident
          direction: incoming
          traversal: both
          max_hops: 4
          connection_criteria: &id002
            kind: group
            conjunction: and
            children:
            - kind: condition
              attribute: type
              comparator: eq
              value: archimate-realization
      value: positive
    - capability: node_color
      applies_to:
      - goal
      mode: match
      match_criteria:
        kind: group
        conjunction: and
        children:
        - kind: incident
          direction: incoming
          traversal: both
          max_hops: 4
          connection_criteria: *id002
          negate: true
      value: critical
  representation_types:
  - archimate-motivation
  selection_mode: query
- slug: requirements-realization
  version: 2
  name: Requirements Realization
  description: 'Requirements Realization (Table C-17, realization). Assessed targets are requirements:
    a requirement is REALIZED iff it has an incoming archimate-realization (direct, or derived up to 4
    modeled hops); realized targets band green and unrealized ones red, while the elements realizing them
    are included as unbanded context. Shows existing realization links only — it does not isolate gaps;
    use the requirements-coverage-gaps view for gap analysis. Starting point for modeling, not a normative
    or exhaustive list.'
  purpose:
  - designing
  - deciding
  - informing
  content:
  - coherence
  stakeholders:
  - Enterprise Architects
  - ICT Architects
  - Business Analysts
  - Requirements Managers
  concerns:
  - architecture strategy and tactics
  - motivation
  query:
    query_schema: 1
    entity_criteria:
      kind: group
      conjunction: and
      children:
      - kind: condition
        attribute: type
        comparator: eq
        value: requirement
    include_connected:
    - direction: incoming
      connection_criteria: &id003
        kind: group
        conjunction: and
        children:
        - kind: condition
          attribute: type
          comparator: eq
          value: archimate-realization
    - direction: incoming
      traversal: derived
      max_hops: 4
      connection_criteria: *id003
    connections:
      traversal: both
  presentation:
    representation: exploration
    target_types:
    - requirement
    styling_rules:
    - capability: node_color
      applies_to:
      - requirement
      mode: match
      match_criteria:
        kind: group
        conjunction: and
        children:
        - kind: incident
          direction: incoming
          traversal: both
          max_hops: 4
          connection_criteria: *id002
      value: positive
    - capability: node_color
      applies_to:
      - requirement
      mode: match
      match_criteria:
        kind: group
        conjunction: and
        children:
        - kind: incident
          direction: incoming
          traversal: both
          max_hops: 4
          connection_criteria: *id002
          negate: true
      value: critical
  representation_types:
  - archimate-motivation
  selection_mode: query
