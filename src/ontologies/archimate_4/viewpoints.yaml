# Appendix-C standard viewpoint library shipped with the ArchiMate module — 25 example
# viewpoint definitions transcribed from the ArchiMate specification's Table C-2 through
# Table C-26 (Appendix C.1 intro: grouping and junction elements are admitted in every
# viewpoint's scope). These are starting points for modeling efforts, not a normative or
# exhaustive list — repo authors are free to add their own in .arch-repo/viewpoints.yaml.
