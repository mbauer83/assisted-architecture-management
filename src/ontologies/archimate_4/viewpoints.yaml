- slug: element-dependents
  version: 1
  name: Element Dependents (Impact of Change)
  description: A tool-specific capability, not part of the ArchiMate standard's example
    viewpoints. Shows every element that transitively depends on a chosen element, so an
    architect can see what is affected if it changes.
  purpose:
  - deciding
  content:
  - coherence
  stakeholders:
  - enterprise-architects
  - operational-managers
  concerns:
  - what is affected if this element changes
  query:
    query_schema: 1
    parameters:
    - name: anchor
      type: entity-id
      required: true
      description: The element whose dependents are analyzed
    entity_criteria:
      kind: group
      conjunction: and
      children:
      - kind: condition
        attribute: id
        comparator: eq
        value:
          from: parameter
          name: anchor
    include_connected:
    - traversal: derived
      include_potential: false
      max_hops: 4
      direction: incoming
    connections:
      enabled: true
      traversal: both
    derived:
    - name: impact-distance
      traversal: derived
      direction: incoming
      reduce: min
      of: relationship.hops
  presentation:
    representation: exploration
    styling_rules:
    - capability: node_color
      mode: scale
      scale_attribute: derived.impact-distance
      scale_min: 1
      scale_max: 4
      scale_tokens:
      - heat-near
      - heat-far
  representation_types:
  - archimate-layered

