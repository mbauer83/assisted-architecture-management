  # only produced by the connection-to-global-entity mechanism.
  global-artifact-reference:
    prefix: GAR
    hierarchy: [common]
    internal: true              # not a modelling element — skipped by domain display
    classes: [internal]
    create_when: ""
    never_create_when: ""
