    classes: [motivation-element]
    create_when: ""
    never_create_when: ""

  goal:
    prefix: GOL
    hierarchy: [motivation]
    classes: [motivation-element]
    create_when: ""
    never_create_when: ""

  outcome:
    prefix: OUT
    hierarchy: [motivation]
    classes: [motivation-element]
    create_when: ""
    never_create_when: ""

  principle:
    prefix: PRI
    hierarchy: [motivation]
    classes: [motivation-element]
    create_when: ""
    never_create_when: ""

  requirement:
    prefix: REQ
    hierarchy: [motivation]
    classes: [motivation-element]
    create_when: ""
    never_create_when: ""

  meaning:
    prefix: MEA
    hierarchy: [motivation]
    classes: [motivation-element]
    create_when: ""
    never_create_when: ""

  value:
    prefix: VAL
    hierarchy: [motivation]
    classes: [motivation-element]
    create_when: ""
    never_create_when: ""


  # ── Strategy Domain ──────────────────────────────────────────────────────
  capability:
    prefix: CAP
