name: archimate-business
ontology: archimate_4
filter:
  hierarchy_level:
    index: 0
    values: [business, common]
includes: []
grouping:
  by_field: hierarchy_0
  stereotype_pattern: "{hierarchy_0|capitalize}Grouping"
layout:
  nesting_connection_classes: [nesting]
  flow_connection_classes: [dynamic]
guidance:
  when_to_use: >-
    Use when modeling the operational business layer: how the organization organizes, processes, and
    delivers value. Covers roles, actors, processes, services, events, and business objects.
  when_not_to_use: >-
    Do not use for application or technology concerns. Do not model strategic direction
    (use archimate-strategy) or motivation and requirements (use archimate-motivation).
