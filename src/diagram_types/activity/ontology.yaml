connection_types:
  step-in-lane:
    embedding: none
    cascade_delete_source: false

  step-note-of:
    embedding: property
    embed_key: note
    cascade_delete_source: true

  swimlane-maps-to: {}

  step-flow:
    embedding: none
    cascade_delete_source: false

  step-then:
    embedding: none
    cascade_delete_source: false

  step-else:
    embedding: none
    cascade_delete_source: false

  step-fork-branch:
    embedding: none
    cascade_delete_source: false

  step-contains:
    embedding: none
    cascade_delete_source: false

entity_types:
  swimlane:
    element_classes: [grouping]
    min: 2
    create_when: >-
      Represents one parallel track in the process. Each lane maps to one actor,
      role, or system. Optionally link to a model entity for traceability.
    never_create_when: >-
      Do not create a swimlane when the process has only one actor, role, or system.
    permitted_mappings:
      entity_types: [role, business-actor, application-component]
      entity_classes: []
      sources:
        - ontology: archimate_next
          entity_type: role
        - ontology: archimate_next
          entity_type: business-actor
        - ontology: archimate_next
          entity_type: application-component
    mapping_required: false
    properties: {}

  action:
    element_classes: [control-flow, step]
    managed_fields:
      type: "required — auto-set to entity_type"
      label: "optional"
      entity_id: "optional — links to a model entity for traceability"
    create_when: >-
      Use for a single task or operation performed by one actor or system in one lane.
      Provide a meaningful label. Add a step-in-lane connection to the owning swimlane.
      Optionally link to a model entity via entity_id for traceability.
      Connect to the next step via step-flow, or to a decision via step-then / step-else.
    never_create_when: >-
      Do not use for branching logic (use decision) or concurrent parallel work (use fork).
    required_connections:
      - connection_type: step-in-lane
        target: swimlane
        cardinality: [1, 1]
    properties:
      link:
        type: string
        required: false
        description: URL attached to the action label as a hyperlink

  decision:
    element_classes: [control-flow, step]
    managed_fields:
      type: "required — auto-set to entity_type"
      label: "optional"
      entity_id: "optional — links to a model entity for traceability"
    create_when: >-
      Use when the flow branches on a condition. Connect one step-then and one step-else
      to the first steps of each branch. Add a step-in-lane connection to the owning
      swimlane. After the branches merge, connect the decision via step-flow to the
      continuation step.
    never_create_when: >-
      Do not use for concurrent parallel execution — use fork for that.
    required_connections:
      - connection_type: step-in-lane
        target: swimlane
        cardinality: [1, 1]
      - connection_type: step-then
        target: "@step"
        cardinality: [1, 1]
      - connection_type: step-else
        target: "@step"
        cardinality: [1, 1]
    properties:
      condition:   {type: string, required: true,  description: Condition text shown in the diamond}
      then_label:  {type: string, required: true,  description: Label on yes/true branch arrow}
      else_label:  {type: string, required: true,  description: Label on no/false branch arrow}

  fork:
    element_classes: [control-flow, step]
    managed_fields:
      type: "required — auto-set to entity_type"
      label: "optional"
    create_when: >-
      Use when two or more steps execute concurrently. All branches run simultaneously
      and are joined before the flow continues. Add a step-in-lane connection to the
      owning swimlane. Connect each branch's first step via a step-fork-branch connection.
    never_create_when: >-
      Do not use for mutually exclusive branches — use decision for that.
    required_connections:
      - connection_type: step-in-lane
        target: swimlane
        cardinality: [1, 1]
      - connection_type: step-fork-branch
        target: "@step"
        cardinality: [2, null]
    properties: {}

  partition:
    element_classes: [step]
    managed_fields:
      type: "required — auto-set to entity_type"
      label: "optional"
    create_when: >-
      Use to group a named set of steps into a visual partition block within the diagram.
      Connect the first contained step via step-contains. Subsequent contained steps are
      chained with step-flow within the partition.
    never_create_when: >-
      Do not use for actor/system separation — use swimlanes for that.
    required_connections:
      - connection_type: step-contains
        target: "@step"
        cardinality: [1, null]
    properties:
      label:
        type: string
        required: false
        description: Display label for the partition block

  note:
    element_classes: [annotation]
    required_connections:
      - connection_type: step-note-of
        target: "@step"
        cardinality: [1, 1]
    properties:
      side: {type: string, enum: [left, right], required: false}
      text: {type: string, required: true}

permitted_relationships:
  - [swimlane, business-actor,         [swimlane-maps-to]]
  - [swimlane, role,                   [swimlane-maps-to]]
  - [swimlane, application-component,  [swimlane-maps-to]]
