name: archimate-strategy
ontology: archimate_next
filter:
  hierarchy_level:
    index: 0
    values: [strategy, common]
includes:
  - _macros.puml
grouping:
  by_field: hierarchy_0
  stereotype_pattern: "{hierarchy_0|capitalize}Grouping"
layout:
  nesting_connection_classes: [nesting]
  flow_connection_classes: [dynamic]
guidance:
  when_to_use: >-
    Use when modeling capability-based planning: what the organization has (resources), what it can
    do (capabilities), and how it acts (courses of action). Bridges motivation to business execution.
  when_not_to_use: >-
    Do not use for detailed operational processes (use archimate-business), software components
    (use archimate-application), or motivation/requirements (use archimate-motivation).
