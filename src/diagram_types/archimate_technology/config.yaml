name: archimate-technology
ontology: archimate_next
filter:
  hierarchy_level:
    index: 0
    values: [technology, common]
includes:
  - _macros.puml
grouping:
  by_field: hierarchy_0
  stereotype_pattern: "{hierarchy_0|capitalize}Grouping"
layout:
  nesting_connection_classes: [nesting]
  flow_connection_classes: [dynamic]
guidance:
  when_to_use: >-
    Use when modeling infrastructure: nodes, devices, networks, system software, technology services,
    and deployed artifacts. Captures the physical and runtime environment.
  when_not_to_use: >-
    Do not use for application logic (use archimate-application) or business processes
    (use archimate-business).
