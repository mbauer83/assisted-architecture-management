name: archimate-application
ontology: archimate_next
filter:
  hierarchy_level:
    index: 0
    values: [application, common]
includes:
  - _macros.puml
grouping:
  by_field: hierarchy_0
  stereotype_pattern: "{hierarchy_0|capitalize}Grouping"
layout:
  nesting_connection_classes: [nesting]
  flow_connection_classes: [dynamic]
guidance:
  when_to_use: >-
    Use when modeling software components, services, interfaces, and data. Captures what applications
    do and what data they manage — the application layer of the architecture.
  when_not_to_use: >-
    Do not use for business process modeling (use archimate-business) or infrastructure and
    deployment (use archimate-technology).
