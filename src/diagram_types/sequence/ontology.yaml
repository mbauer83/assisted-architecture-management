connection_types:
  seq-message:
    embedding: none
    cascade_delete_source: false

  seq-from:
    embedding: none
    cascade_delete_source: true

  seq-to:
    embedding: none
    cascade_delete_source: true

  seq-note-of:
    embedding: property
    embed_key: note
    cascade_delete_source: true

entity_types:
  lifeline:
    classes: [participant]
    create_when: >-
      Use for each participant (actor, system, component, service) in the sequence.
      Optionally add a binding to a model entity (business-actor, role,
      application-component, application-service, node) for model traceability.
    never_create_when: >-
      Do not create multiple lifelines for the same participant.
    permitted_mappings:
      entity_types: [role, business-actor, application-component, application-service, node]
      entity_classes: []
      sources:
        - ontology: archimate_next
          entity_type: role
        - ontology: archimate_next
          entity_type: business-actor
        - ontology: archimate_next
          entity_type: application-component
        - ontology: archimate_next
          entity_type: application-service
        - ontology: archimate_next
          entity_type: node
    mapping_required: false
    properties: {}

  message:
    classes: [message]
    create_when: >-
      Use for each message or call between two lifelines. Set sequence_index (integer,
      1-based) for ordering and provide a label. Add seq-from and seq-to connections
      to the source and target lifelines. Optionally add a binding to a model
      connection for traceability.
    never_create_when: >-
      Do not create a message without seq-from and seq-to connections to lifelines.
    required_connections:
      - connection_type: seq-from
        target: lifeline
        cardinality: [1, 1]
      - connection_type: seq-to
        target: lifeline
        cardinality: [1, 1]
    properties:
      sequence_index:
        type: integer
        required: true
        description: Total ordering of this message in the diagram (1-based)
      arrow_style:
        type: string
        enum: [sync, async, reply, create, destroy]
        required: false
        description: Arrow notation style (default sync)

  fragment:
    classes: [grouping]
    create_when: >-
      Use to group a range of messages into a combined fragment block (opt, alt,
      loop, par). Set from_index and to_index to the sequence_index range covered.
    never_create_when: >-
      Do not use fragment for a single unconditional message.
    properties:
      kind:
        type: string
        enum: [opt, alt, loop, par]
        required: true
        description: Fragment type
      from_index:
        type: integer
        required: true
        description: sequence_index of the first message covered by this fragment
      to_index:
        type: integer
        required: true
        description: sequence_index of the last message covered by this fragment
      condition:
        type: string
        required: false
        description: Guard condition shown in the fragment header

  execution-spec:
    classes: [activation]
    create_when: >-
      Use to indicate that a participant is active (executing) during a range of
      messages. Set lifeline_id to the target lifeline and from_index/to_index
      to the message sequence_index range.
    never_create_when: >-
      Omit when the execution period is not relevant to the scenario.
    properties:
      lifeline_id:
        type: string
        required: true
        description: Id of the lifeline this execution spec covers
      from_index:
        type: integer
        required: true
        description: sequence_index of the first covered message
      to_index:
        type: integer
        required: true
        description: sequence_index of the last covered message

  note:
    classes: [annotation]
    required_connections:
      - connection_type: seq-note-of
        target: lifeline
        cardinality: [1, 1]
    properties:
      text:
        type: string
        required: true
      side:
        type: string
        enum: [left, right]
        required: false

permitted_relationships: []

allowed_bindings:
  entity:
    lifeline:
      correspondence_kinds: [represents, traces-to]
      default_correspondence_kind: represents
      target_forms: [entity-id, diagram-local]
    message:
      correspondence_kinds: [represents, abstracts, traces-to]
      default_correspondence_kind: represents
      target_forms: [connection-id, connection-ids, diagram-local]
