name: sequence
includes: []
grouping: {}
layout: {}
element_classes:
  participant:
    description: A named participant column (lifeline) in the sequence
  message:
    description: A temporal message between two participants
  activation:
    description: An execution specification period on a lifeline
guidance:
  when_to_use: >-
    Use for modeling ordered message flows between participants (actors, systems,
    components, services). Suitable for API call flows, protocols, integration
    scenarios, and behavior walkthroughs.
  when_not_to_use: >-
    Do not use for static structure or process modeling — prefer ArchiMate or
    activity diagrams for those.
ui:
  label: Sequence Diagram
  description: UML sequence diagram with lifelines and messages
  entity_search_filter: false
  diagram_only_types:
    - entity_type: lifeline
      label: Lifeline
      plural: Lifelines

    - entity_type: message
      label: Message
      plural: Messages

    - entity_type: fragment
      label: Fragment
      plural: Fragments

    - entity_type: execution-spec
      label: Execution Specification
      plural: Execution Specifications
